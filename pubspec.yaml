name: flutter_native_3d
description: >-
  Render glTF and GLB 3D models natively in Flutter using SceneKit on iOS
  and Filament on Android. No WebView. Supports animations, camera controls,
  lighting presets, and network loading with progress.
version: 0.1.0
repository: https://github.com/user/flutter_native_3d
issue_tracker: https://github.com/user/flutter_native_3d/issues
topics:
  - 3d
  - gltf
  - scenekit
  - filament
  - rendering

environment:
  sdk: ^3.11.1
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.flutternative3d.flutter_native_3d
        pluginClass: FlutterNative3dPlugin
      ios:
        pluginClass: FlutterNative3dPlugin
